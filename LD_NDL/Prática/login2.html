<html>
    <head>
        <style>
            body{
                background: url(NM.jpg);
                display: flex;
                justify-content: center;
                align-items: center;
                font-family:'Poppins',
                sans-serif;
                backdrop-filter: blur(4px);
            }
            .container{
                height: 300px;
                width: 200px;
                background-color: transparent;
                border: 1px solid rgb(224, 224, 213);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            }
            h3,h4{
                color: rgb(2, 0, 0);
            }
            .circle{
                margin: 7px auto;
                width: 40px;
                height: 40px;
                border: 5px solid ;
                border-radius: 50%;
                border-top-color: rgb(255, 255, 255);
                animation: spin 1s linear infinite;
            }
            @keyframes spin{
                100%{
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div>
                <h4>LOADING...</h4>
                <h3>Nova Reserva</h3>
                <div class="circle"></div>
            </div>
        </div>
    </body>
</html>
